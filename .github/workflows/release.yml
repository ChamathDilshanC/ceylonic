name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Version and Publish
    runs-on: ubuntu-latest
    # Defensive guard, not currently load-bearing: pushes made with the
    # default GITHUB_TOKEN (used below) don't trigger new workflow runs at
    # all, so the version-bump commit's own push won't normally re-enter
    # this job. This condition only matters if the token is ever swapped
    # for a PAT that *does* re-trigger runs — cheap insurance either way.
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Typecheck, lint, and test
        run: |
          npm run typecheck
          npm run lint
          npm run test

      - name: Check for pending changesets
        id: changesets
        run: |
          if find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | grep -q .; then
            echo "pending=true" >> "$GITHUB_OUTPUT"
          else
            echo "pending=false" >> "$GITHUB_OUTPUT"
          fi

      # Bumps package.json + CHANGELOG.md and deletes the consumed
      # .changeset/*.md files, builds dist/ for the new version, then
      # publishes to npm. The git commit for the version bump only
      # happens in the next step, and only if this one succeeds — so a
      # failed publish never leaves an uncommitted version bump behind.
      - name: Version, build, and publish to npm
        if: steps.changesets.outputs.pending == 'true'
        run: |
          npx changeset version
          npm run build
          npx changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump and push tags
        if: steps.changesets.outputs.pending == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release [skip release]"
          git push --follow-tags origin HEAD:main
